<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="psicología, Granada, Zaidín, EMDR, terapia, ansiedad, depresión, duelo, bienestar emocional, psicóloga, Carmen María Martín">
    <meta name="author" content="Carmen María Martín Fuentes">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Merriweather:wght@300;400&display=swap" rel="stylesheet">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/img/carmen-foto.jpg' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ '/assets/img/carmen-foto.jpg' | absolute_url }}">

    <!-- Elfsight Platform -->
    <script src="https://static.elfsight.com/platform/platform.js" async></script>

    <!-- Schema.org structured data (Local SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Psychologist",
      "@id": "{{ site.url }}/#psychologist",
      "name": "{{ site.title }}",
      "description": "{{ site.description | strip_newlines | strip }}",
      "url": "{{ site.url }}",
      "logo": "{{ site.url }}/assets/img/carmen-foto.jpg",
      "image": "{{ site.url }}/assets/img/carmen-foto.jpg",
      "telephone": "{{ site.phone_e164 }}",
      "email": "{{ site.email }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ site.address }}",
        "addressLocality": "{{ site.address_locality }}",
        "addressRegion": "{{ site.address_region }}",
        "postalCode": "{{ site.postal_code }}",
        "addressCountry": "ES"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": {{ site.geo_latitude }},
        "longitude": {{ site.geo_longitude }}
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "{{ site.opening_hours_am_start }}",
          "closes": "{{ site.opening_hours_am_end }}"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "{{ site.opening_hours_pm_start }}",
          "closes": "{{ site.opening_hours_pm_end }}"
        }
      ],
      "priceRange": "€€",
      "currenciesAccepted": "EUR",
      "paymentAccepted": "Transferencia bancaria, efectivo",
      "areaServed": [
        { "@type": "City", "name": "{{ site.address_locality }}" },
        { "@type": "AdministrativeArea", "name": "{{ site.address_region }}" }
      ],
      "knowsAbout": [
        "EMDR",
        "Terapia cognitivo-conductual",
        "Ansiedad",
        "Duelo",
        "Depresión",
        "Trastornos de la conducta alimentaria",
        "Violencia de género",
        "Trauma psicológico"
      ],
      "hasCredential": {
        "@type": "EducationalOccupationalCredential",
        "credentialCategory": "Colegiada",
        "recognizedBy": {
          "@type": "Organization",
          "name": "Colegio Oficial de Psicología de Andalucía Oriental"
        },
        "identifier": "{{ site.colegiada }}"
      },
      "sameAs": [
        "{{ site.instagram_url }}",
        "{{ site.facebook_url }}",
        "{{ site.youtube_url }}"
      ]
    }
    </script>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-56MD4247');</script>
    <!-- End Google Tag Manager -->

    <!-- Google tag (gtag.js) - Loaded conditionally based on consent -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        // Default consent to denied
        gtag('consent', 'default', {
            'analytics_storage': 'denied'
        });

        gtag('js', new Date());
    </script>
</head>
<body>
    <!-- Consent Banner -->
    {% include consent-banner.html %}

    {% include header.html %}

    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-56MD4247"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <main class="main-content">
        {{ content }}
    </main>

    {% include footer.html %}

    <!-- Load gtag.js asynchronously after consent -->
    <script>
        (function() {
            function loadGtag() {
                var script = document.createElement('script');
                script.async = true;
                script.src = 'https://www.googletagmanager.com/gtag/js?id=AW-17697924088';
                document.head.appendChild(script);

                // Configure after loading
                window.gtag('config', 'AW-17697924088');
            }

            // Check if user already gave consent
            var consentChoice = localStorage.getItem('tupsicologia-consent');
            if (consentChoice === 'accepted') {
                loadGtag();
            }

            // Listen for consent acceptance
            document.addEventListener('consentAccepted', loadGtag);
        })();
    </script>

    <script src="{{ '/assets/js/consent.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
